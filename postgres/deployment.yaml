apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresdb
  namespace: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresdb
  template:
    metadata:
      labels:
        app: postgresdb
    spec:
      containers:
      - name: postgresdb
        image: postgres:15
        envFrom:
        - configMapRef:
            name: postgresdb-config
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-storage
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgresdb-pvc
