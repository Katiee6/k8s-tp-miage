apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresdb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Katiee6/k8s-tp-miage.git
    targetRevision: main
    path: postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true # Supprime les ressources retirées de Git
      selfHeal: true # Corrige automatiquement les dérives manuelles
    syncOptions:
    - CreateNamespace=true
